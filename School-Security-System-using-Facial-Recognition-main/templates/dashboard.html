{% extends "base.html" %}
{% block content %}

<!-- ЗАГОЛОВОК СТРАНИЦЫ -->
<div class="mb-6">
    <h2 class="text-xl sm:text-2xl font-bold text-gray-900">Панель управления</h2>
    <p class="text-sm text-gray-600 mt-1">Общая статистика и информация о системе</p>
    <div class="mt-3 h-1 w-16 bg-[#4a5a6b] rounded-full"></div>
</div>

<section class="rounded-xl bg-white p-4 sm:p-6 shadow-sm border border-[#4a5a6b]/30 hover:shadow-md transition-all mb-6">
    <h3 class="text-base sm:text-lg font-bold text-gray-900 mb-2">{{ tr('index_about_title') }}</h3>
    <p class="text-gray-600 text-sm leading-relaxed">{{ tr('index_about_p') }}</p>
</section>

<section class="rounded-xl bg-white p-4 sm:p-6 shadow-sm border border-[#4a5a6b]/30 hover:shadow-md transition-all">
    <h3 class="text-base sm:text-lg font-bold text-gray-900 mb-4">{{ tr('index_how_title') }}</h3>
    <ol class="list-decimal list-inside space-y-2 text-sm text-gray-600">
        <li>{{ tr('index_li1') }}</li>
        <li>{{ tr('index_li2') }}</li>
        <li>{{ tr('index_li3') }}</li>
    </ol>
</section>
{% endblock %}
