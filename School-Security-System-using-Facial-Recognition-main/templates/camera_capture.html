{% extends "base.html" %}
{% block content %}

<!-- ЗАГОЛОВОК СТРАНИЦЫ -->
<div class="mb-6">
    <h2 class="text-xl sm:text-2xl font-bold text-gray-900">Фото с камеры</h2>
    <p class="text-sm text-gray-600 mt-1">Создание фотографий учеников и сотрудников через веб-камеру</p>
    <div class="mt-3 h-1 w-16 bg-[#4a5a6b] rounded-full"></div>
</div>

<div class="max-w-2xl mx-auto">
    <div class="rounded-xl bg-white p-4 sm:p-6 shadow-sm border border-[#4a5a6b]/30 hover:shadow-md transition-all">
        <h3 class="text-base sm:text-lg font-bold text-gray-900 mb-4">
              Сделать фото
        </h3>

        <!-- ФИЛЬТРЫ -->
        <div class="grid gap-3 sm:grid-cols-3 mb-4">
            <input type="text" id="filterName" placeholder="Поиск по ФИО" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4a5a6b]/30 focus:border-[#4a5a6b]/30 text-sm">
            <input type="text" id="filterDep" placeholder="Поиск по классу" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4a5a6b]/30 focus:border-[#4a5a6b]/30 text-sm">
            <input type="text" id="filterCourse" placeholder="Поиск по должности" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4a5a6b]/30 focus:border-[#4a5a6b]/30 text-sm">
        </div>

        <div class="flex gap-2 mb-4">
            <button id="applyFilterBtn" class="bg-[#4a5a6b] text-white px-4 py-2 rounded-lg hover:bg-[#3d4a59] transition text-sm font-medium inline-flex items-center gap-2">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="8"/>
    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  Найти
</button>

<button id="resetFilterBtn" class="bg-gray-100 text-gray-700 px-4 py-2 rounded-lg hover:bg-gray-200 transition text-sm font-medium inline-flex items-center gap-2">
  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
    <path d="M3 3v5h5"/>
  </svg>
  Сбросить
</button>
        </div>

        <!-- Выбор студента -->
        <select id="studentSelect" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#4a5a6b]/30 focus:border-[#4a5a6b]/30 text-sm mb-4">
            <option value="">Выберите персоналию</option>
            {% for s in students %}
            <option value="{{ s.Student_id }}"
                    data-name="{{ s.Name }}"
                    data-dep="{{ s.Dep }}"
                    data-course="{{ s.course }}">
                {{ s.Name }} (ID: {{ s.Student_id }})
            </option>
            {% endfor %}
        </select>

        <!-- Видео с камеры -->
        <div class="bg-black rounded-lg overflow-hidden mb-4 aspect-video">
            <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
        </div>

        <!-- Прогресс -->
        <div class="mb-4">
            <p class="text-sm text-gray-600 mb-1">Сделано фото: <span id="photoCount">0</span> / 100</p>
            <div class="w-full bg-gray-200 rounded-full h-2">
                <div id="progress" class="bg-green-500 h-2 rounded-full transition-all" style="width: 0%"></div>
            </div>
        </div>

        <!-- Кнопки -->
        <div class="flex gap-2">
            <button id="startBtn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-red-700 transition text-sm font-medium">
                Начать съёмку
            </button>
            <button id="trainBtn" class="bg-[#4a5a6b] text-white px-6 py-2 rounded-lg hover:bg-[#3d4a59] transition text-sm font-medium" style="display:none">
                Обучить модель
            </button>
        </div>
    </div>
</div>

<script>
    let photoCount = 0;
    let currentStudentId = null;
    let isCapturing = false;

    const video = document.getElementById('video');
    const studentSelect = document.getElementById('studentSelect');
    const startBtn = document.getElementById('startBtn');
    const trainBtn = document.getElementById('trainBtn');

    const filterName = document.getElementById('filterName');
    const filterDep = document.getElementById('filterDep');
    const filterCourse = document.getElementById('filterCourse');
    const applyFilterBtn = document.getElementById('applyFilterBtn');
    const resetFilterBtn = document.getElementById('resetFilterBtn');

    // Сохраняем все оригинальные опции
    let allOptions = [];
    for (let i = 0; i < studentSelect.options.length; i++) {
        const opt = studentSelect.options[i];
        if (opt.value === "") continue;
        allOptions.push({
            value: opt.value,
            text: opt.text,
            name: (opt.getAttribute('data-name') || '').toLowerCase(),
            dep: (opt.getAttribute('data-dep') || '').toLowerCase(),
            course: (opt.getAttribute('data-course') || '').toLowerCase()
        });
    }

    // Функция обновления списка
    function updateSelectList() {
        const nameSearch = filterName.value.toLowerCase();
        const depSearch = filterDep.value.toLowerCase();
        const courseSearch = filterCourse.value.toLowerCase();

        studentSelect.innerHTML = '<option value="">Выберите студента</option>';

        let found = false;

        for (let opt of allOptions) {
            const matchName = nameSearch === "" || opt.name.includes(nameSearch);
            const matchDep = depSearch === "" || opt.dep.includes(depSearch);
            const matchCourse = courseSearch === "" || opt.course.includes(courseSearch);

            if (matchName && matchDep && matchCourse) {
                found = true;
                const option = document.createElement('option');
                option.value = opt.value;
                option.text = opt.text;
                option.setAttribute('data-name', opt.name);
                option.setAttribute('data-dep', opt.dep);
                option.setAttribute('data-course', opt.course);
                studentSelect.appendChild(option);
            }
        }

        if (!found && (nameSearch !== "" || depSearch !== "" || courseSearch !== "")) {
            const emptyOpt = document.createElement('option');
            emptyOpt.value = "";
            emptyOpt.text = "-- Нет студентов по фильтру --";
            studentSelect.appendChild(emptyOpt);
        }
    }

    applyFilterBtn.onclick = () => {
        updateSelectList();
    };

    resetFilterBtn.onclick = () => {
        filterName.value = '';
        filterDep.value = '';
        filterCourse.value = '';
        updateSelectList();
    };

    filterName.onkeypress = (e) => { if (e.key === 'Enter') updateSelectList(); };
    filterDep.onkeypress = (e) => { if (e.key === 'Enter') updateSelectList(); };
    filterCourse.onkeypress = (e) => { if (e.key === 'Enter') updateSelectList(); };

    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => { video.srcObject = stream; })
        .catch(err => alert('Ошибка камеры: ' + err.message));

    startBtn.onclick = async () => {
        currentStudentId = studentSelect.value;
        if (!currentStudentId) {
            alert('Сначала выберите студента!');
            return;
        }
        if (isCapturing) return;

        isCapturing = true;
        startBtn.disabled = true;

        for (let i = 1; i <= 100; i++) {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
            const formData = new FormData();
            formData.append('photo', blob, `photo_${i}.jpg`);

            await fetch(`/students/${currentStudentId}/capture`, { method: 'POST', body: formData });

            photoCount = i;
            document.getElementById('photoCount').innerText = photoCount;
            document.getElementById('progress').style.width = (photoCount / 100 * 100) + '%';

            await new Promise(r => setTimeout(r, 100));
        }

        alert('✅ Готово! Сделано 100 фото.');
        trainBtn.style.display = 'inline-block';
        isCapturing = false;
        startBtn.disabled = false;
    };

    trainBtn.onclick = async () => {
        trainBtn.disabled = true;
        trainBtn.innerText = 'ОБУЧЕНИЕ...';
        window.location.href = '/train';
    };
</script>
{% endblock %}
